name = "telefonchik-worker"
main = "worker/src/index.ts"
compatibility_date = "2024-01-01"

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RoomDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Для локальной разработки — раскомментировать и указать pages url после деплоя клиента
# [vars]
# PAGES_URL = "http://localhost:5173"

# Production: привязка к Pages (укажите свой URL после деплоя)
# [env.production.vars]
# PAGES_URL = "https://telefonchik.pages.dev"
